name: NeoPowerWeb CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Linter
        run: npm run lint
        continue-on-error: true

      - name: Build TypeScript & Vite
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Entre na pasta do projeto no servidor VPS (ajuste o caminho se necessário)
            cd /var/www/NeoPowerWeb
            
            # Baixe as últimas atualizações
            git pull origin main
            
            # Instale novas dependências
            npm install
            
            # Realize o build da aplicação React/Vite
            npm run build
            
            # NOTA: Como é uma aplicação frontend (Vite), normalmente o Nginx ou Apache
            # já passará a servir os novos arquivos da pasta "dist" logo após o build.
            # Se você usar o PM2 com um servidor estático (ex: "serve"), descomente e ajuste a linha abaixo:
            # pm2 restart neopower-web || pm2 start "npm run preview" --name neopower-web
